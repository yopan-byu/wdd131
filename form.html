<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review | WDD 131</title>
  <meta name="description" content="Submit a product review including rating, installation date, and optional feedback.">
  <meta name="author" content="Brother Leonidas Yopan">

  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/getdates.js" defer></script>
  <script src="scripts/form.js" defer></script>
</head>

<body>
  <header class="page-header">
    <h1>Product Review</h1>
  </header>

  <main>
    <div class="form-panel">
      <form method="get" action="review.html">
        <div>
          <label for="product">Product Name</label>
          <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
          </select>
        </div>

        <fieldset>
          <legend>Overall Rating</legend>
          <div class="rating-row">
            <div class="rating-item">
              <label for="rating1"><span class="stars">&star;</span><input type="radio" id="rating1" name="rating"
                  value="1" required></label>
            </div>
            <div class="rating-item">
              <label for="rating2"><span class="stars">&star;&star;</span><input type="radio" id="rating2" name="rating"
                  value="2"></label>
            </div>
            <div class="rating-item">
              <label for="rating3"><span class="stars">&star;&star;&star;</span><input type="radio" id="rating3"
                  name="rating" value="3"></label>
            </div>
            <div class="rating-item">
              <label for="rating4"><span class="stars">&star;&star;&star;&star;</span><input type="radio" id="rating4"
                  name="rating" value="4"></label>
            </div>
            <div class="rating-item">
              <label for="rating5"><span class="stars">&star;&star;&star;&star;&star;</span><input type="radio"
                  id="rating5" name="rating" value="5"></label>
            </div>
          </div>
        </fieldset>

        <div>
          <label for="installDate">Date of Installation</label>
          <input type="date" id="installDate" name="installDate" required>
        </div>

        <fieldset>
          <legend>Which features did you find useful in the product? (Check all that apply)</legend>
          <div class="check-list">
            <div class="check-row">
              <input type="checkbox" id="feat-d" name="features" value="durability">
              <label for="feat-d">Durability</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="feat-e" name="features" value="ease-of-use">
              <label for="feat-e">Ease of Use</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="feat-p" name="features" value="performance">
              <label for="feat-p">Performance</label>
            </div>
            <div class="check-row">
              <input type="checkbox" id="feat-des" name="features" value="design">
              <label for="feat-des">Design</label>
            </div>
          </div>
        </fieldset>

        <div>
          <label for="writtenReview">Written Review (Optional)</label>
          <textarea id="writtenReview" name="writtenReview"></textarea>
        </div>

        <div>
          <label for="userName">Your Name (Optional)</label>
          <input type="text" id="userName" name="userName" autocomplete="name">
        </div>

        <div class="submit-wrap">
          <input type="submit" value="Post Review">
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>
      &copy; <span id="currentyear"></span> | Brother Leonidas Yopan | Santa
      Catarina, Brazil
    </p>
    <p id="lastModified"></p>
  </footer>
</body>

</html>
